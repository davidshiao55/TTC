[pytest]
markers =
    needs_cuda: requires a CUDA device; auto-skipped via conftest if unavailable
    stage7_perf: Stage 7 BF16 GEMM performance microbench; deselected
        by default (runs ~30 s, separate from correctness suite). Opt
        in with `pytest -m stage7_perf` or `--run-stage7-perf`.
addopts = -m "not stage7_perf"
